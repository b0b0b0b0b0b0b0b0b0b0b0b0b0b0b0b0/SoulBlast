name: SoulBlast
version: '${version}'
main: bm.b0b0b0.SoulBlast.SoulBlast
api-version: '1.21'
authors: [ b0b0b0 ]
libraries:
  - net.elytrium:serializer:1.1.1
  - org.xerial:sqlite-jdbc:3.45.3.0
  - it.unimi.dsi:fastutil:8.5.15
loadbefore:
  - WorldGuard
loadafter:
  - ProtectionStones
softdepend:
  - Vault
  - Essentials
  - WorldGuard
  - ProtectionStones
  - LuckPerms
  - CoreProtect
commands:
  soulblast:
    description: SoulBlast dynamite management
    usage: /soulblast give <player> <id> [amount] | menu | reload | rollback <user> <radius> <time>
    permission: soulblast.use
  soulgrimoire:
    description: Open SoulBlast grimoire menu
    aliases: [soulfire, soulblast-menu]
    permission: soulblast.menu
  decayblocks:
    description: Open gradual block decay catalog menu
    aliases: [soulblastblocks, blocks]
    permission: soulblast.decay.menu
  psholo:
    description: Hide or show your ProtectionStones hologram
    usage: /psholo hide | show | toggle
    aliases: [pshologram, pshide]
    permission: soulblast.ps.hologram
permissions:
  soulblast.use:
    default: op
  soulblast.give:
    default: op
  soulblast.menu:
    default: true
  soulblast.reload:
    default: op
  soulblast.rollback:
    default: op
  soulblast.decay.menu:
    default: true
  soulblast.decay.repair:
    default: true
  soulblast.region.bypass:
    default: false
  soulblast.ps.hologram:
    default: true
  soulblast.ps.hologram.admin:
    default: op
